<!DOCTYPE html>
<html>

<head>
<title>Mumbai Train AI Predictor</title>
</head>

<body>

<h2>Mumbai Local Train Crowd Predictor 🚆</h2>

<form action="/predict" method="post">

Hour:
<input type="number" name="hour" required>
<br><br>

Day (1-7):
<input type="number" name="day" required>
<br><br>

Weekend (0 = No, 1 = Yes):
<input type="number" name="weekend" required>
<br><br>

Holiday (0 = No, 1 = Yes):
<input type="number" name="holiday" required>
<br><br>

<button type="submit">Predict Crowd</button>

</form>

<h3>{{ prediction_text }}</h3>

</body>

</html>
